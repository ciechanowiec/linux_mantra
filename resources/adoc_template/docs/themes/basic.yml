extends: default-with-font-fallbacks
font:
  catalog:
    merge: true
    Noto Emoji Full:
      normal: NotoEmoji-Regular.ttf
      bold: NotoEmoji-Regular.ttf
      italic: NotoEmoji-Regular.ttf
      bold_italic: NotoEmoji-Regular.ttf
  fallbacks: [M+ 1p Fallback, Noto Emoji Full, Noto Emoji]
image:
  align: center
  caption:
    align: inherit
footer:
  columns: =100%
  recto:
    center:
      content: '{page-number}'
  verso:
    center:
      content: '{page-number}'
role:
  red:
    font-color: ff0000
  bad-icon:
    font-color: 'C9302C'
  good-icon:
    font-color: '1E7E34'
